<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Block Blast Game Online Free | Classical Block Puzzle Games</title>
    <meta name="description" content="Block Blast is an addictive mix of block and jigsaw puzzle games. Play Block Blast Game Online For Free.">
    <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <link rel="canonical" href="https://blockblastgame.app">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #game-wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
      }

      #GameDiv {
        position: relative;
      }

      #LoadingIndicator {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #fff;
        z-index: 10;
      }

      #LoadingIndicator img {
        width: 100px;
        height: 100px;
        border-radius: 16px;
        margin: 0 auto 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        display: block;
      }

      .spinner {
        border: 4px solid rgba(255,255,255,0.2);
        border-top: 4px solid #3498db;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        animation: spin 1s linear infinite;
        margin: 0 auto 12px;
      }

      @keyframes spin {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .loading-text {
        font-family: sans-serif;
        font-size: 14px;
        color: #aaa;
        letter-spacing: 0.05em;
      }

      #GameCanvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <div id="GameDiv" cc_exact_fit_screen="false">
        <div id="LoadingIndicator">
          <img src="images/logo.png" alt="Block Blast Logo">
          <div class="spinner"></div>
          <p class="loading-text">Loading…</p>
        </div>
        <div id="Cocos3dGameContainer">
          <canvas id="GameCanvas" tabindex="99"></canvas>
        </div>
      </div>
    </div>

    <script>
      // Scale the game canvas to fill the viewport while preserving the 360x640 aspect ratio
      const GAME_W = 360;
      const GAME_H = 640;

      function resize() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / GAME_W, vh / GAME_H);
        const w = Math.round(GAME_W * scale);
        const h = Math.round(GAME_H * scale);

        const gameDiv = document.getElementById('GameDiv');
        const canvas  = document.getElementById('GameCanvas');

        gameDiv.style.width  = w + 'px';
        gameDiv.style.height = h + 'px';

        canvas.width  = GAME_W;
        canvas.height = GAME_H;
        canvas.style.width  = w + 'px';
        canvas.style.height = h + 'px';
      }

      resize();
      window.addEventListener('resize', resize);
    </script>

    <!-- Polyfills bundle -->
    <script src="src/polyfills.bundle.js" charset="utf-8"></script>
    <!-- SystemJS support -->
    <script src="src/system.bundle.js" charset="utf-8"></script>
    <!-- Import map -->
    <script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"></script>

    <script>
      System.import('./index.js')
        .catch(function(err) { console.error(err); })
        .finally(function() {
          document.getElementById('LoadingIndicator').style.display = 'none';
        });
    </script>
  </body>
</html>
